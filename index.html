<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnonymousPro Official | Premium BIN Database</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0d1117;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -10%, #1e1b4b 0%, var(--bg) 80%);
        }

        /* প্রগ্রেস বার */
        #topProgress {
            position: fixed; top: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple));
            width: 0%; z-index: 1000; transition: width 0.4s ease;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        /* হেডার ও সার্চবার */
        .header {
            text-align: center; padding: 50px 10px 30px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0; color: #fff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.7);
            letter-spacing: 5px;
        }

        .search-container {
            position: sticky; top: 15px; z-index: 100;
            margin: 30px auto; max-width: 600px;
        }

        #searchInput {
            width: 100%; padding: 15px 25px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid var(--border);
            border-radius: 50px; color: #fff;
            font-size: 1rem; outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        #searchInput:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .status-panel {
            display: flex; justify-content: center; gap: 10px; margin-top: 15px;
        }

        .badge {
            background: rgba(0, 242, 255, 0.05);
            padding: 5px 12px; border-radius: 4px;
            border: 1px solid var(--border);
            font-size: 11px; color: var(--neon-blue);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* কার্ড গ্রিড */
        #binGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px; margin-top: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px; padding: 20px;
            border: 1px solid var(--border);
            position: relative; overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            transform: scale(1.02);
        }

        .card-id {
            color: var(--neon-blue); font-size: 1.4rem; font-weight: 700;
            display: block; margin-bottom: 15px;
            font-family: 'Orbitron', sans-serif;
        }

        table { width: 100%; border-collapse: collapse; }
        td { 
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 14px;
        }
        td:first-child { 
            color: var(--text-dim); text-transform: uppercase; 
            font-size: 10px; width: 35%; font-weight: 700;
        }

        .copy-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(112, 0, 255, 0.1); 
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple); padding: 5px 12px;
            border-radius: 5px; cursor: pointer;
            font-size: 11px; transition: 0.3s;
        }

        .copy-btn:hover { background: var(--neon-purple); color: #fff; }

        /* লোড মোর বাটন */
        .load-more-container {
            text-align: center; margin: 40px 0;
        }

        #loadMoreBtn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 12px 40px; border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold; cursor: pointer;
            transition: 0.3s;
            display: none; /* শুরুতে হাইড থাকবে */
        }

        #loadMoreBtn:hover {
            background: var(--neon-blue);
            color: var(--bg);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        footer { text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px; }

        /* মোবাইল অপ্টিমাইজেশন */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            h1 { font-size: 2.2rem; }
            #binGrid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="topProgress"></div>

<header class="header">
    <h1>AnonymousPro Official</h1>
    <div class="status-panel">
        <div id="fileInfo" class="badge">Initializing...</div>
        <div id="dataInfo" class="badge">Total: 0</div>
    </div>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by BIN, Country, Vendor..." oninput="handleSearch()">
    </div>

    <div id="binGrid"></div>

    <div class="load-more-container">
        <button id="loadMoreBtn" onclick="loadNextBatch()">LOAD MORE DATA</button>
        <p id="loadingText" style="color: var(--neon-blue); font-size: 12px;">SYSTEM SYNCING...</p>
    </div>
</div>

<footer>
    <p>AnonymousPro Official  © AnonymousPro Official </p>
</footer>

<script>
    let masterData = [];
    let filteredData = [];
    let displayedCount = 0;
    const batchSize = 10; // আপনার রিকোয়ারমেন্ট অনুযায়ী ১০টি করে
    const username = "HumayunShariarHimu";
    const repo = "BINBUZZ";

    async function fastLoad() {
        try {
            const apiRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
            const files = (await apiRes.json()).filter(f => f.name.toLowerCase().endsWith('.csv'));
            
            document.getElementById('fileInfo').innerText = `Source: ${files.length} Files`;
            let loadedFiles = 0;

            const fetchPromises = files.map(file => {
                return new Promise(resolve => {
                    Papa.parse(file.download_url, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            masterData = masterData.concat(results.data);
                            filteredData = masterData;
                            loadedFiles++;
                            updateProgress(loadedFiles, files.length);
                            if(displayedCount === 0) {
                                document.getElementById('loadingText').style.display = 'none';
                                document.getElementById('loadMoreBtn').style.display = 'inline-block';
                                loadNextBatch();
                            }
                            resolve();
                        }
                    });
                });
            });

            await Promise.all(fetchPromises);
            document.getElementById('fileInfo').innerText = `System: Online`;
        } catch (err) {
            document.getElementById('fileInfo').innerText = `Error: Link Failed`;
        }
    }

    function updateProgress(current, total) {
        const percent = (current / total) * 100;
        document.getElementById('topProgress').style.width = percent + '%';
        document.getElementById('dataInfo').innerText = `Total: ${masterData.length.toLocaleString()}`;
    }

    function loadNextBatch() {
        const grid = document.getElementById('binGrid');
        const nextBatch = filteredData.slice(displayedCount, displayedCount + batchSize);
        
        if (nextBatch.length === 0) {
            document.getElementById('loadMoreBtn').style.display = 'none';
            return;
        }

        let html = '';
        nextBatch.forEach((item, i) => {
            const idx = displayedCount + i;
            const binValue = Object.values(item)[0] || 'Unknown';
            let rows = '';
            for (let [k, v] of Object.entries(item)) {
                if(v) rows += `<tr><td>${k}</td><td>${v}</td></tr>`;
            }
            html += `
                <div class="card">
                    <button class="copy-btn" onclick="copyCard(this)">COPY</button>
                    <span class="card-id">${binValue}</span>
                    <table>${rows}</table>
                </div>`;
        });

        grid.insertAdjacentHTML('beforeend', html);
        displayedCount += batchSize;

        if(displayedCount >= filteredData.length) {
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    // স্মার্ট সার্চ লজিক
    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = ''; // গ্রিড ক্লিয়ার করা
        displayedCount = 0;

        filteredData = masterData.filter(item => {
            return Object.values(item).some(val => 
                String(val).toLowerCase().includes(query)
            );
        });

        if(filteredData.length > 0) {
            document.getElementById('loadMoreBtn').style.display = 'inline-block';
            loadNextBatch();
        } else {
            document.getElementById('binGrid').innerHTML = '<p style="text-align:center; width:100%; color:var(--neon-purple);">No Data Found in Database</p>';
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }

    const grid = document.getElementById('binGrid');

    function copyCard(btn) {
        const card = btn.parentElement;
        const text = card.innerText.replace("COPY", "").trim();
        navigator.clipboard.writeText(text);
        btn.innerText = "COPIED!";
        btn.style.borderColor = "var(--neon-blue)";
        btn.style.color = "var(--neon-blue)";
        setTimeout(() => {
            btn.innerText = "COPY";
            btn.style.borderColor = "var(--neon-purple)";
            btn.style.color = "var(--neon-purple)";
        }, 1500);
    }

    window.onload = fastLoad;
</script>

</body>
</html>
